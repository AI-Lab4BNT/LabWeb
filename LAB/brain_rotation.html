<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brain Rotation Playground</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 20% 20%, #14213d 0%, #000000 80%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
        }

        h1 {
            font-size: clamp(1.8rem, 4vw, 3rem);
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }

        p {
            max-width: 740px;
            line-height: 1.6;
            margin: 0.5rem auto 1.5rem;
            opacity: 0.85;
        }

        .brain-box {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            background: rgba(10, 22, 44, 0.65);
            box-shadow: 0 0 35px rgba(0, 0, 0, 0.4);
            padding: 1rem;
            max-width: 900px;
            width: 100%;
        }

        #brainCanvas {
            width: 100%;
            height: 420px;
            background: radial-gradient(circle at 40% 40%, #1d2b4f 0%, #090f1d 85%);
            border-radius: 16px;
            display: block;
            cursor: grab;
        }

        .controls {
            margin-top: 1rem;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
        }

        .controls label {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.9rem;
            color: #e2e8f0;
        }

        .controls input[type="range"] {
            width: 95%;
            margin-top: 0.3rem;
        }

        .btn-main {
            margin-top: 1.6rem;
            padding: 0.8rem 1.7rem;
            border: 1px solid #f59e0b;
            color: #fff;
            background: linear-gradient(135deg, rgba(246, 146, 44, 0.75), rgba(255, 172, 56, 0.95));
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(245, 158, 11, 0.45);
        }

        @media (max-width: 880px) {
            .controls {
                grid-template-columns: 1fr;
            }

            #brainCanvas {
                height: 320px;
            }
        }
    </style>
</head>
<body>
    <div class="brain-box" style="border:none; background: transparent; box-shadow: none; padding: 0;">
        <canvas id="brainCanvas" width="900" height="420"></canvas>
    </div>
    <p style="margin-top: 1rem; opacity: 0.8; font-size: 0.95rem;">Automatic redirect to main page in 5 seconds. Click anywhere to go now.</p>

    <script>
        const canvas = document.getElementById('brainCanvas');
        const ctx = canvas.getContext('2d');
        const yawControl = document.getElementById('yawControl');
        const pitchControl = document.getElementById('pitchControl');
        const autoRotateToggle = document.getElementById('autoRotate');
        const width = canvas.width;
        const height = canvas.height;

        let yaw = 0;
        let pitch = 0.2;
        let autoRotate = true;

        const nodes = [];
        const edges = [];
        const sparkle = new Set();
        const sparkTimers = [];

        const nodeCount = 280;

        function randomBrainNode() {
            while (true) {
                const x = Math.random() * 300 - 150;
                const y = Math.random() * 180 - 90;
                const z = Math.random() * 160 - 80;
                const normalized = (x / 150) ** 2 + (y / 90) ** 2 + (z / 80) ** 2;
                if (normalized <= 1) return { x, y, z };
            }
        }

        for (let i = 0; i < nodeCount; i++) {
            nodes.push({ ...randomBrainNode(), id: i });
        }

        function dist(a, b) {
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            const dz = a.z - b.z;
            return Math.sqrt(dx * dx + dy * dy + dz * dz);
        }

        nodes.forEach((node, index) => {
            const sorted = [...nodes]
                .filter((_, i) => i !== index)
                .sort((a, b) => dist(node, a) - dist(node, b));
            for (let j = 0; j < 4; j++) {
                const target = sorted[j];
                const key = `${Math.min(node.id, target.id)}-${Math.max(node.id, target.id)}`;
                if (!edges.some(e => e.key === key)) {
                    edges.push({ from: node, to: target, key });
                }
            }
        });

        function project(pt) {
            const scale = 350 / (350 + pt.z);
            return {
                x: width / 2 + pt.x * scale,
                y: height / 2 - pt.y * scale,
                size: Math.max(1.5, 6 * scale),
                z: pt.z,
                depth: scale,
            };
        }

        function rotateNode(node, yawAngle, pitchAngle) {
            const cosYaw = Math.cos(yawAngle);
            const sinYaw = Math.sin(yawAngle);
            const cosPitch = Math.cos(pitchAngle);
            const sinPitch = Math.sin(pitchAngle);

            const x1 = node.x * cosYaw - node.z * sinYaw;
            const z1 = node.x * sinYaw + node.z * cosYaw;
            const y1 = node.y;

            const y2 = y1 * cosPitch - z1 * sinPitch;
            const z2 = y1 * sinPitch + z1 * cosPitch;

            return { x: x1, y: y2, z: z2 };
        }

        function createSpark() {
            const idx = Math.floor(Math.random() * nodes.length);
            sparkle.add(idx);
            sparkTimers[idx] = 16;
        }

        function updateSparks() {
            if (Math.random() < 0.18) createSpark();
            for (const id of Array.from(sparkle)) {
                sparkTimers[id] -= 1;
                if (sparkTimers[id] <= 0) {
                    sparkle.delete(id);
                }
            }
        }

        function render() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(6, 11, 22, 0.16)';
            ctx.fillRect(0, 0, width, height);

            const transformed = nodes.map(node => ({ node, pos: rotateNode(node, yaw, pitch) }));
            const drawn = transformed.map(o => ({ ...o, projected: project(o.pos) }));
            drawn.sort((a, b) => a.projected.depth - b.projected.depth);

            edges.forEach(edge => {
                const from = drawn.find(d => d.node.id === edge.from.id).projected;
                const to = drawn.find(d => d.node.id === edge.to.id).projected;
                const depth = (from.depth + to.depth) / 2;
                const alpha = Math.max(0.05, Math.min(0.22, depth * 0.24));
                ctx.strokeStyle = `rgba(128, 200, 255, ${alpha})`;
                ctx.lineWidth = 1 * depth;
                ctx.beginPath();
                ctx.moveTo(from.x, from.y);
                ctx.lineTo(to.x, to.y);
                ctx.stroke();
            });

            drawn.forEach(item => {
                const p = item.projected;
                const isSpark = sparkle.has(item.node.id);
                const glow = isSpark ? 1 : 0.55 + Math.sin(Date.now() * 0.006 + item.node.id) * 0.2;
                const color = isSpark ? '255, 225, 32' : '128, 200, 255';
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * 0.9, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${color}, ${0.35 * glow})`;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * (isSpark ? 2.2 : 1.3), 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(${color}, ${isSpark ? 0.95 : 0.3 * glow})`;
                ctx.lineWidth = isSpark ? 2 : 1;
                ctx.stroke();
            });
        }

        let dragging = false;
        let lastX = 0;
        let lastY = 0;

        canvas.addEventListener('mousedown', e => {
            dragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
            canvas.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', e => {
            if (!dragging) return;
            const dx = e.clientX - lastX;
            const dy = e.clientY - lastY;
            lastX = e.clientX;
            lastY = e.clientY;
            yaw += dx * 0.008;
            pitch += dy * 0.007;
            pitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, pitch));
            if (yawControl) yawControl.value = Math.round((yaw * 180) / Math.PI);
            if (pitchControl) pitchControl.value = Math.round((pitch * 180) / Math.PI);
            if (autoRotateToggle) autoRotateToggle.checked = false;
            autoRotate = false;
        });

        window.addEventListener('mouseup', () => {
            dragging = false;
            canvas.style.cursor = 'grab';
        });

        yawControl?.addEventListener('input', e => {
            yaw = (Number(e.target.value) * Math.PI) / 180;
            autoRotate = false;
            if (autoRotateToggle) autoRotateToggle.checked = false;
        });

        pitchControl?.addEventListener('input', e => {
            pitch = (Number(e.target.value) * Math.PI) / 180;
            autoRotate = false;
            if (autoRotateToggle) autoRotateToggle.checked = false;
        });

        autoRotateToggle?.addEventListener('change', e => {
            autoRotate = e.target.checked;
        });

        function animate() {
            if (autoRotate) yaw += 0.004;
            updateSparks();
            render();
            requestAnimationFrame(animate);
        }

        const redirectToMain = () => {
            window.location.href = '../index.html';
        };

        setTimeout(redirectToMain, 5000);
        document.body.addEventListener('click', redirectToMain, { once: true });

        animate();
    </script>
</body>
</html>
